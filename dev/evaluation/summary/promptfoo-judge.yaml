description: Npcink AI summary candidate LLM judge evaluation

prompts:
  - '{{summary}}'

providers:
  - id: echo
    label: generated-candidate

tests: file://generated/promptfoo-judge-cases.csv

defaultTest:
  options:
    rubricPrompt: |
      [
        {
          "role": "system",
          "content": "你是中文 WordPress 摘要质量评审员。只根据给定标题、正文和候选摘要评分，不使用外部知识。必须输出 JSON：{\"reason\":\"中文简短原因\",\"pass\":boolean,\"score\":number}，score 取 0.0 到 1.0。"
        },
        {
          "role": "user",
          "content": "标题：{{title}}\n正文：{{article_content}}\n已有摘要：{{existing_excerpt}}\n候选摘要：{{output}}\n\n评分标准：{{rubric}}\n\n请严格按 JSON 输出。"
        }
      ]
  assert:
    - type: llm-rubric
      metric: ai_summary_quality
      threshold: 0.6
      value: |
        判断候选摘要是否适合作为公开发布后的 WordPress 文章摘要。

        评分映射：
        - 0.0-0.19 = 1分：生成失败、事实错误、明显误导、无法使用。
        - 0.20-0.39 = 2分：主题相关但逻辑混乱、核心对象缺失、核心价值缺失，需要大改。
        - 0.40-0.59 = 3分：方向可参考，但摘要不够清楚、只覆盖局部小节、太泛、像说明书或需要明显重写。
        - 0.60-0.79 = 4分：基本可用，只需要小改。
        - 0.80-1.00 = 5分：可直接作为当前文章摘要。

        重点检查：
        - 忠于正文，不添加正文没有的事实、效果、承诺或比较。
        - 覆盖文章核心对象、用途或读者价值；产品介绍要说明产品类型/定位和关键能力。
        - 标题中明确出现的定位词或差异化卖点，如果正文支持，摘要不应完全漏掉。
        - 教程类内容要覆盖主要流程、场景族或决策路径，不能只概括第一步或单个小节。
        - 如果文章包含多个必须覆盖的能力族、步骤族或场景族，摘要至少要代表主要分组，不能只抓局部细节。
        - 逻辑清楚，不堆砌功能词，不让读者误解工具、步骤、对象或适用场景之间的关系。
        - 适合作为公开摘要，不出现“本文”“这篇文章”“草稿”等元话术。
        - 不过度营销，不使用无依据的夸张表达。

        只有 score >= 0.6 且没有事实错误、误导或生成失败时 pass 才能为 true。
