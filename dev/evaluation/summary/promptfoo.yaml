description: Npcink AI summary candidate offline evaluation

prompts:
  - '{{summary}}'

providers:
  - id: echo
    label: generated-candidate

tests: file://generated/promptfoo-cases.csv

defaultTest:
  assert:
    - type: javascript
      value: file://promptfoo-assertions.js:notGenerationError
      metric: generation_success
    - type: javascript
      value: file://promptfoo-assertions.js:validChineseExcerptLength
      metric: excerpt_length
    - type: javascript
      value: file://promptfoo-assertions.js:noMetaFraming
      metric: no_meta_framing
    - type: javascript
      value: file://promptfoo-assertions.js:openingQuality
      metric: opening_quality
